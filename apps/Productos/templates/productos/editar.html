{% extends "base.html" %}
{% block title %}Editar Producto — InventaPro{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="{{ url_for('bp_productos.listar') }}" class="text-gray-400 hover:text-white transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </a>
        <h2 class="text-2xl font-extrabold text-white">Editar Producto</h2>
    </div>

    <div class="bg-gray-800 rounded-xl border border-gray-700 p-6 sm:p-8 shadow-xl">
        <form action="{{ url_for('bp_productos.editar', id=item.id) }}" method="POST" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label for="nombre" class="block text-sm font-medium text-gray-300 mb-2">Nombre del Producto</label>
                    <input type="text" id="nombre" name="nombre" value="{{ item.nombre }}" required
                           class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-gray-100 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition duration-200">
                </div>

                <div>
                    <label for="categoria_id" class="block text-sm font-medium text-gray-300 mb-2">Categoría</label>
                    <select id="categoria_id" name="categoria_id" required
                            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-gray-100 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition duration-200">
                        {% for cat in categorias %}
                        <option value="{{ cat.id }}" {% if cat.id == item.categoria_id %}selected{% endif %}>{{ cat.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label for="precio" class="block text-sm font-medium text-gray-300 mb-2">Precio de Venta (Bs.)</label>
                    <input type="number" id="precio" name="precio" value="{{ item.precio }}" step="0.01" min="0" required
                           class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-gray-100 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition duration-200">
                </div>

                <div>
                    <label for="stock" class="block text-sm font-medium text-gray-300 mb-2">Stock</label>
                    <input type="number" id="stock" name="stock" value="{{ item.stock }}" min="0" required
                           class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-gray-100 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition duration-200">
                </div>

                <div>
                    <label for="stock_minimo" class="block text-sm font-medium text-gray-300 mb-2">Stock Mínimo Alerta</label>
                    <input type="number" id="stock_minimo" name="stock_minimo" value="{{ item.stock_minimo }}" min="1" required
                           class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-gray-100 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition duration-200">
                </div>

                <div class="md:col-span-2">
                    <label for="descripcion" class="block text-sm font-medium text-gray-300 mb-2">Descripción (Opcional)</label>
                    <textarea id="descripcion" name="descripcion" rows="3"
                              class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-gray-100 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition duration-200">{{ item.descripcion or '' }}</textarea>
                </div>
            </div>

            <div class="flex gap-4 pt-4 border-t border-gray-700">
                <button type="submit"
                        class="bg-brand-500 hover:bg-brand-600 text-gray-900 font-bold px-6 py-2.5 rounded-lg transition duration-200 shadow-md">
                    Guardar Cambios
                </button>
                <a href="{{ url_for('bp_productos.listar') }}"
                   class="bg-gray-700 hover:bg-gray-650 text-gray-200 font-bold px-6 py-2.5 rounded-lg transition duration-200 border border-gray-600">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
