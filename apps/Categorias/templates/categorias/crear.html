{% extends "base.html" %}
{% block title %}Nueva Categoría — InventaPro{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="{{ url_for('bp_categorias.listar') }}" class="text-gray-400 hover:text-white transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </a>
        <h2 class="text-2xl font-extrabold text-white">Nueva Categoría</h2>
    </div>

    <div class="bg-gray-800 rounded-xl border border-gray-700 p-6 sm:p-8 shadow-xl">
        <form action="{{ url_for('bp_categorias.crear') }}" method="POST" class="space-y-6">
            <div>
                <label for="nombre" class="block text-sm font-medium text-gray-300 mb-2">Nombre de la Categoría</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ej. Electrónica, Alimentos..."
                       class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition duration-200">
            </div>

            <div>
                <label for="descripcion" class="block text-sm font-medium text-gray-300 mb-2">Descripción (Opcional)</label>
                <textarea id="descripcion" name="descripcion" rows="3" placeholder="Breve descripción de la categoría..."
                          class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition duration-200"></textarea>
            </div>

            <div class="flex gap-4 pt-4 border-t border-gray-700">
                <button type="submit"
                        class="bg-brand-500 hover:bg-brand-600 text-gray-900 font-bold px-6 py-2.5 rounded-lg transition duration-200 shadow-md">
                    Guardar
                </button>
                <a href="{{ url_for('bp_categorias.listar') }}"
                   class="bg-gray-700 hover:bg-gray-650 text-gray-200 font-bold px-6 py-2.5 rounded-lg transition duration-200 border border-gray-600">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
